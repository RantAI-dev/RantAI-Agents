name: Pre-Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  checks: read

concurrency:
  group: prerelease-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  pre-release:
    name: Validate and Publish Edge Image
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: horizonlife
          POSTGRES_PASSWORD: horizonlife_secret
          POSTGRES_DB: horizonlife_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}
      DATABASE_URL: postgresql://horizonlife:horizonlife_secret@localhost:5432/horizonlife_test
      TEST_DATABASE_URL: postgresql://horizonlife:horizonlife_secret@localhost:5432/horizonlife_test
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Initialize submodules with CI-safe URLs
        shell: bash
        run: |
          set -euo pipefail
          git submodule set-url packages/rantaiclaw https://github.com/RantAI-dev/RantaiClaw.git
          git submodule set-url packages/community-skills https://github.com/RantAI-dev/RantAI-Agents-Community.git
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate submodule compatibility and upstream checks
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REQUIRED_RANTAICLAW_CHECKS: CI Required Gate
        run: bun run check:release-compat --verify-rantaiclaw-checks

      - name: Run compliance checks
        run: |
          bun run check:thin-routes
          bun run check:domain-imports
          bun run check:frontend-compliance

      - name: Run unit tests
        run: bun run test:unit

      - name: Push schema to test database
        run: bunx prisma db push --skip-generate

      - name: Run integration tests
        run: bun run test:integration

      - name: Run production build gate
        run: bun run build

      - name: Resolve edge tags
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          short_sha="$(echo "${GITHUB_SHA}" | cut -c1-7)"
          image_name="${IMAGE_NAME,,}"
          tags="${image_name}:edge"$'\n'"${image_name}:sha-${short_sha}"
          {
            echo "tags<<EOF"
            echo "${tags}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push edge image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.vars.outputs.tags }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.title=RantAI Agents
            org.opencontainers.image.description=Enterprise-grade AI agent platform
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
