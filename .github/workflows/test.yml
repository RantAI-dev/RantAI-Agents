name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - run: bun run test:unit

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: horizonlife
          POSTGRES_PASSWORD: horizonlife_secret
          POSTGRES_DB: horizonlife_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Push schema to test database
        run: bunx prisma db push --skip-generate
        env:
          DATABASE_URL: postgresql://horizonlife:horizonlife_secret@localhost:5432/horizonlife_test

      - name: Run integration tests
        run: bun run test:integration
        env:
          DATABASE_URL: postgresql://horizonlife:horizonlife_secret@localhost:5432/horizonlife_test
          TEST_DATABASE_URL: postgresql://horizonlife:horizonlife_secret@localhost:5432/horizonlife_test
