services:
  postgres:
    image: postgres:16
    container_name: rantai-agents-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: horizonlife
      POSTGRES_PASSWORD: horizonlife_secret
      POSTGRES_DB: horizonlife_insurance
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U horizonlife -d horizonlife_insurance"]
      interval: 10s
      timeout: 5s
      retries: 5

  surrealdb:
    image: surrealdb/surrealdb:v2
    container_name: rantai-agents-surrealdb
    restart: unless-stopped
    user: root
    command: start --user root --pass root surrealkv:/data/database.db
    ports:
      - "8000:8000"
    volumes:
      - surrealdb_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # S3-compatible object storage (SeaweedFS)
  # All-in-one server (master + volume + filer + S3 gateway).
  # S3 API stays on :9000 so existing S3_ENDPOINT values keep working.
  # Identities/credentials are loaded from docker/seaweedfs/s3.json.
  seaweedfs:
    image: chrislusf/seaweedfs:latest
    container_name: rantai-agents-seaweedfs
    restart: unless-stopped
    command: >-
      server
      -dir=/data
      -s3
      -s3.port=9000
      -s3.config=/etc/seaweedfs/s3.json
      -master.volumeSizeLimitMB=1024
    ports:
      - "9000:9000"  # S3 API
      - "9333:9333"  # Master UI / cluster admin
    volumes:
      - seaweedfs_data:/data
      - ./docker/seaweedfs/s3.json:/etc/seaweedfs/s3.json:ro

  # Ollama for local OCR models (optional)
  # Supports: GLM-OCR, Moondream, MiniCPM-V, Qwen3-VL
  # Opt-in: `docker compose --profile ocr up -d`
  # Skipped by default — OCR falls back to OpenRouter when OPENROUTER_API_KEY is set.
  # Pull models with: docker exec -it rantai-agents-ollama ollama pull glm-ocr
  ollama:
    profiles: ["ocr"]
    image: ollama/ollama:latest
    container_name: rantai-agents-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    # GPU support (uncomment if you have NVIDIA GPU)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Piston - Sandboxed code execution for AI Code Interpreter
  # Install runtimes after first start:
  #   curl -sX POST http://localhost:2000/api/v2/packages -H "Content-Type: application/json" -d '{"language":"python","version":"3.10.0"}'
  #   curl -sX POST http://localhost:2000/api/v2/packages -H "Content-Type: application/json" -d '{"language":"javascript","version":"18.15.0"}'
  #   curl -sX POST http://localhost:2000/api/v2/packages -H "Content-Type: application/json" -d '{"language":"typescript","version":"5.0.3"}'
  # Scale with: docker compose up -d --scale piston=3
  piston:
    image: ghcr.io/engineer-man/piston
    container_name: rantai-agents-piston
    restart: unless-stopped
    privileged: true
    ports:
      - "2000:2000"
    environment:
      - PISTON_RUN_TIMEOUT=15000
      - PISTON_COMPILE_TIMEOUT=15000
      - PISTON_RUN_MEMORY_LIMIT=256000000
      - PISTON_OUTPUT_MAX_SIZE=4194304  # 4MB — allow base64-encoded images
    volumes:
      - piston_packages:/piston/packages
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:2000/api/v2/runtimes || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # SearXNG - Private meta-search engine for AI Web Search tool
  # Admin: http://localhost:8080
  # Used by web_search tool via SEARCH_API_URL env var
  searxng:
    image: searxng/searxng:latest
    container_name: rantai-agents-searxng
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - searxng_data:/etc/searxng
      - ./docker/searxng-settings.yml:/etc/searxng/settings.yml:ro
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080/
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  surrealdb_data:
  seaweedfs_data:
  ollama_data:
  piston_packages:
  searxng_data:
